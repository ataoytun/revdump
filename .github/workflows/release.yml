name: release

# Only version tags publish a release; never branches or PRs.
on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN is read-only; uploading release assets needs write.
permissions:
  contents: write

jobs:
  release:
    # revdump links ntdll/dbghelp + windows-sys against the Windows SDK; build natively, no cross.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc, x86_64-pc-windows-msvc

      - name: Build revdump64
        run: cargo build --release -p revdump64 --target x86_64-pc-windows-msvc

      - name: Build revdump32
        run: cargo build --release -p revdump32 --target i686-pc-windows-msvc

      - name: Stage artifacts
        shell: pwsh
        run: |
          $bins = @(
            "target\x86_64-pc-windows-msvc\release\revdump64.exe",
            "target\i686-pc-windows-msvc\release\revdump32.exe"
          )
          foreach ($b in $bins) {
            if (-not (Test-Path $b)) { throw "missing build artifact: $b" }
          }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $bins dist\

      - name: Checksums
        shell: pwsh
        run: |
          Get-ChildItem dist\*.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii dist\SHA256SUMS.txt
          Get-Content dist\SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
